version: '3'

services:
  lb:
    image: caddy:2.7.6
    container_name: caddy
    ports:
      - 8080:80
    depends_on:
      - app1
      - app2
      - app3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
  app1: 
    image: app1
    build:
      context: app1/
  app2:
    image: app2
    build:
      context: app2/
  app3:
    image: app3
    build:
      context: app3/

  redis:
    image: "redis:alpine"